<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>DSF Image Viewer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/viewer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div id="viewer-layout">
        <div id="viewer-canvas">
            <div id="viewer-stage">
                <!-- Fixed logical page stage (9:16). Size: css/variables.css + js/page-geometry.js -->
                <div id="content-stage">
                    <div id="viewer-content"></div>
                    <div id="viewer-bubbles"></div>
                </div>
                <!-- 見開き時の隣ページ -->
                <div id="viewer-spread-stage" style="display:none;">
                    <div id="viewer-spread-content"></div>
                </div>
            </div>
            <!-- UD Touch Zones for navigation -->
            <!-- Center zone is 40% to prevent mis-clicks near the edges -->
            <div id="click-layer" style="position:absolute; inset:0; z-index:100; display:flex;">
                <div id="zone-prev" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavLeft()"
                    title="前のページ"></div>
                <div id="zone-menu" style="flex: 0 0 40%; height:100%; cursor:pointer;" onclick="toggleUi()"
                    title="メニュー表示/非表示"></div>
                <div id="zone-next" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavRight()"
                    title="次のページ"></div>
            </div>
        </div>
        <aside id="viewer-info-panel" class="viewer-info-panel" data-state="closed" data-layout="sheet" hidden>
            <div class="viewer-info-panel-shell">
                <button id="viewer-info-handle" class="viewer-info-handle" type="button" aria-label="作品情報を開く">
                    <span class="viewer-info-handle-bar"></span>
                </button>
                <div class="viewer-info-panel-head">
                    <div class="viewer-info-panel-kicker" id="viewer-info-kicker"></div>
                    <div class="viewer-info-panel-actions">
                        <button id="viewer-info-peek-btn" class="viewer-info-action" type="button" onclick="stepDownViewerInfoPanel()" title="縮小">
                            <span class="material-icons" aria-hidden="true">keyboard_arrow_down</span>
                        </button>
                        <button id="viewer-info-expand-btn" class="viewer-info-action" type="button" onclick="stepUpViewerInfoPanel()" title="展開">
                            <span class="material-icons" aria-hidden="true">keyboard_arrow_up</span>
                        </button>
                        <button id="viewer-info-close-btn" class="viewer-info-action" type="button" onclick="setViewerInfoPanelState('closed')" title="閉じる">
                            <span class="material-icons" aria-hidden="true">close</span>
                        </button>
                    </div>
                </div>
                <div class="viewer-info-panel-summary">
                    <h2 id="viewer-info-title" class="viewer-info-title"></h2>
                    <div id="viewer-info-series" class="viewer-info-series" hidden></div>
                    <div class="viewer-info-meta-list">
                        <div id="viewer-info-label-row" class="viewer-info-meta-row" hidden>
                            <span class="viewer-info-meta-label">Label</span>
                            <span id="viewer-info-label" class="viewer-info-meta-value"></span>
                        </div>
                        <div id="viewer-info-author-row" class="viewer-info-meta-row" hidden>
                            <span class="viewer-info-meta-label">Author</span>
                            <span id="viewer-info-author" class="viewer-info-meta-value"></span>
                        </div>
                    </div>
                    <p id="viewer-info-description" class="viewer-info-description" hidden></p>
                </div>
                <div id="viewer-info-body" class="viewer-info-panel-body">
                    <section id="viewer-info-notes-section" class="viewer-info-section" hidden>
                        <h3 class="viewer-info-section-title">Liner Notes</h3>
                        <div id="viewer-info-notes" class="viewer-info-richtext"></div>
                    </section>
                    <section id="viewer-info-review-section" class="viewer-info-section" hidden>
                        <h3 class="viewer-info-section-title">Reviews</h3>
                        <div id="viewer-info-reviews" class="viewer-info-placeholder"></div>
                    </section>
                </div>
            </div>
        </aside>
    </div>

    <div id="viewer-empty-state" class="viewer-empty-state" hidden>
        <div class="viewer-empty-panel">
            <div class="viewer-empty-brand">DSF Viewer</div>
            <h1 id="viewer-empty-title"></h1>
            <p id="viewer-empty-body"></p>
            <button id="viewer-empty-open" class="viewer-empty-open-btn" type="button"
                onclick="document.getElementById('file-input').click()">
                <span class="material-icons" aria-hidden="true">folder_open</span>
                <span id="viewer-empty-open-label"></span>
            </button>
            <div id="viewer-empty-hint" class="viewer-empty-hint"></div>
        </div>
    </div>

    <div id="viewer-ui">
        <div id="viewer-header" class="ui-bar">
            <!-- Left: Close Button -->
            <button id="viewer-close-btn" class="btn-icon header-btn" onclick="toggleUi()" title="閉じる">
                <span class="material-icons" aria-hidden="true">close</span>
            </button>

            <!-- Center: Title -->
            <div class="ui-title" id="ui-title"></div>

            <!-- Right: Controls & Branding -->
            <div class="ui-controls">
                <div class="viewer-ui-lang-switcher">
                    <button class="viewer-ui-lang-btn" data-ui-lang="ja" onclick="setViewerUiLang('ja')">JA</button>
                    <button class="viewer-ui-lang-btn" data-ui-lang="en" onclick="setViewerUiLang('en')">EN</button>
                </div>
                <div id="viewer-lang-picker" class="viewer-lang-picker" style="display:none;">
                    <button id="lang-picker-button" class="viewer-lang-picker-button" type="button" onclick="toggleViewerLangMenu()"></button>
                    <div id="lang-picker-menu" class="viewer-lang-picker-menu"></div>
                </div>
                <div id="viewer-auth-slot" class="viewer-auth-slot"></div>
                <button id="viewer-info-btn" class="btn-icon header-btn" onclick="toggleViewerInfoPanel()" title="作品情報">
                    <span class="material-icons" aria-hidden="true">info</span>
                </button>
                <button id="viewer-spread-btn" class="btn-icon header-btn" onclick="toggleViewerSpread()" title="見開き表示">
                    <span class="material-icons" aria-hidden="true">auto_stories</span>
                </button>
                <button id="viewer-file-btn" class="btn-icon header-btn" onclick="document.getElementById('file-input').click()"
                    title="ファイルを開く">
                    <span class="material-icons" aria-hidden="true">folder_open</span>
                </button>
            </div>
        </div>

        <div id="viewer-footer" class="ui-bar">
            <div class="ui-controls footer-controls">
                <!-- Branding Link back to portal (Moved to footer for less distraction) -->
                <a href="/" title="DSF Portal" class="viewer-footer-brand"
                    style="text-decoration:none; display:flex; align-items:baseline; pointer-events:auto;">
                    <span
                        style="font-family:'Inter',sans-serif; font-size:10px; color:#64748b; margin-right:4px;">Powered
                        by</span>
                    <span
                        style="font-family:'Outfit',sans-serif; font-size:14px; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg, #60a5fa, #818cf8); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">DSF</span>
                </a>

                <div class="slider-wrapper">
                    <input type="range" id="page-slider" min="1" max="1" value="1" oninput="jumpToPage(this.value)">
                </div>
                <div class="footer-nav-group">
                    <span id="page-count" class="page-count">1 / 1</span>
                    <div class="viewer-nav-btns">
                        <button id="viewer-nav-left" class="nav-btn" onclick="viewerNavLeft()"><span class="material-icons" aria-hidden="true">chevron_left</span></button>
                        <button id="viewer-nav-right" class="nav-btn" onclick="viewerNavRight()"><span class="material-icons" aria-hidden="true">chevron_right</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="file-input" onchange="loadDsf(this)">

    <script type="module" src="js/viewer.js"></script>
</body>

</html>
