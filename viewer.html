<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>DSF Image Viewer</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            /* Usable height */
            width: 100%;
        }

        #viewer-canvas {
            position: relative;
            background: #000;
            /* Set to black to kill any white bleed on subpixel gaps */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            /* Dimensions set by JS for perfect fit */
        }

        #viewer-content,
        #viewer-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through to canvas handler */
        }

        .viewer-text-page {
            width: 100%;
            height: 100%;
            position: relative;
            padding: 0;
            box-sizing: border-box;
            background: #fafafa;
            overflow: hidden;
        }

        .viewer-text-block {
            position: absolute;
            white-space: pre;
            word-break: normal;
            overflow-wrap: normal;
            overflow: hidden;
        }

        /* Reuse text-layer styles but ensure correct positioning */
        .text-layer {
            pointer-events: none;
            /* Read only */
        }

        #viewer-ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ui-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0 20px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease-in-out;
            pointer-events: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            height: 60px;
            /* fallback */
            height: 8vh;
            /* slightly more than 5% to be touch friendly */
            box-sizing: border-box;
        }

        #viewer-header {
            transform: translateY(-100%);
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        #viewer-footer {
            transform: translateY(100%);
            justify-content: space-between;
            gap: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        #viewer-ui.visible #viewer-header,
        #viewer-ui.visible #viewer-footer {
            transform: translateY(0);
        }

        .ui-title {
            font-weight: bold;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
        }

        .ui-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        #page-slider {
            flex: 1;
            margin: 0 10px;
            cursor: pointer;
            width: 100%;
            height: 44px;
            /* Ensure UD touch target size without expanding the visual track */
            min-height: 44px;
            padding: 0;
            /* Reset global input padding */
            border: none;
            /* Reset global input border */
            background: transparent;
            /* Reset global input background */
            accent-color: var(--primary, #1248a1);
        }

        .page-count {
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            color: #666;
            min-width: 40px;
            text-align: center;
        }

        /* Override text-layer for padding */
        .text-layer {
            padding-top: 5vh !important;
            padding-bottom: 5vh !important;
            height: 100% !important;
            /* Ensure it fills height including padding */
        }

        #file-input {
            display: none;
        }

        /* Font family is controlled by saved canonical layout. */
    </style>
</head>

<body>

    <div id="viewer-canvas">
        <div id="viewer-stage"
            style="width:100%; height:100%; position:absolute; top:0; left:0; transform-origin:center center;">
            <!-- Fixed resolution stage (360x640) for consistent rendering -->
            <div id="content-stage"
                style="position:absolute; top:0; left:0; width:360px; height:640px; transform-origin:top left; background:#fff; overflow:hidden;">
                <div id="viewer-content"></div>
                <div id="viewer-bubbles"></div>
            </div>
        </div>
        <!-- UD Touch Zones for navigation -->
        <div id="click-layer" style="position:absolute; inset:0; z-index:100; display:flex;">
            <div id="zone-prev" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavLeft()"
                title="前のページ"></div>
            <div id="zone-menu" style="flex: 1; height:100%; cursor:pointer;" onclick="toggleUi()" title="メニュー表示/非表示">
            </div>
            <div id="zone-next" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavRight()"
                title="次のページ"></div>
        </div>
    </div>

    <div id="viewer-ui">
        <div id="viewer-header" class="ui-bar">
            <div class="ui-title" id="ui-title"></div>
            <div class="ui-controls">
                <span id="viewer-auth-status" class="page-count" style="min-width:72px;">ゲスト</span>
                <button id="viewer-auth-btn" class="btn-sm" onclick="viewerToggleAuth()">Sign in</button>
                <!-- Language Select (Styled) -->
                <select id="lang-select" onchange="switchViewerLang(this.value)"
                    style="padding:4px; border-radius:4px; border:1px solid #ccc; font-size:12px; display:none;">
                </select>
            </div>
        </div>

        <div id="viewer-footer" class="ui-bar">
            <div class="ui-controls" style="flex:1;">
                <button id="viewer-nav-left" class="btn-icon" onclick="viewerNavLeft()">◀</button>
                <input type="range" id="page-slider" min="1" max="1" value="1" oninput="jumpToPage(this.value)">
                <span id="page-count" class="page-count">1 / 1</span>
                <button id="viewer-nav-right" class="btn-icon" onclick="viewerNavRight()">▶</button>
            </div>
            <div class="ui-controls">
                <button class="btn-icon" onclick="document.getElementById('file-input').click()"
                    title="ファイルを開く">📂</button>
                <button class="btn-icon" onclick="toggleUi()" title="閉じる">✕</button>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="file-input" onchange="loadDsf(this)">

    <script type="module" src="js/viewer.js"></script>
</body>

</html>
