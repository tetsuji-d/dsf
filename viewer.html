<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>DSF Image Viewer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/viewer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="viewer-canvas">
        <canvas id="webgl-canvas"
            style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1; touch-action:none;"></canvas>
        <div id="viewer-stage"
            style="width:100%; height:100%; position:absolute; top:0; left:0; transform-origin:center center;">
            <!-- Fixed resolution stage (360x640) for consistent rendering -->
            <div id="content-stage"
                style="position:absolute; top:0; left:0; width:360px; height:640px; transform-origin:top left; background:#fff; overflow:hidden;">
                <div id="viewer-content"></div>
                <div id="viewer-bubbles"></div>
            </div>
        </div>
        <!-- UD Touch Zones for navigation -->
        <!-- Center zone is 40% to prevent mis-clicks near the edges -->
        <div id="click-layer" style="position:absolute; inset:0; z-index:100; display:flex;">
            <div id="zone-prev" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavLeft()"
                title="前のページ"></div>
            <div id="zone-menu" style="flex: 0 0 40%; height:100%; cursor:pointer;" onclick="toggleUi()"
                title="メニュー表示/非表示"></div>
            <div id="zone-next" style="flex: 0 0 30%; height:100%; cursor:pointer;" onclick="viewerNavRight()"
                title="次のページ"></div>
        </div>
    </div>

    <div id="viewer-ui">
        <div id="viewer-header" class="ui-bar">
            <!-- Left: Close Button -->
            <button class="btn-icon header-btn" onclick="toggleUi()" title="閉じる">✕</button>

            <!-- Center: Title -->
            <div class="ui-title" id="ui-title"></div>

            <!-- Right: Controls & Branding -->
            <div class="ui-controls">
                <select id="lang-select" onchange="switchViewerLang(this.value)"
                    style="padding:4px; border-radius:4px; border:1px solid #ccc; font-size:12px; display:none;">
                </select>
                <button class="btn-icon header-btn" onclick="document.getElementById('file-input').click()"
                    title="ファイルを開く">📂</button>
            </div>
        </div>

        <div id="viewer-footer" class="ui-bar">
            <div class="ui-controls footer-controls">
                <!-- Branding Link back to portal (Moved to footer for less distraction) -->
                <a href="/" title="DSF Portal"
                    style="text-decoration:none; display:flex; align-items:baseline; margin-right: 8px; pointer-events:auto;">
                    <span
                        style="font-family:'Inter',sans-serif; font-size:10px; color:#64748b; margin-right:4px;">Powered
                        by</span>
                    <span
                        style="font-family:'Outfit',sans-serif; font-size:14px; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg, #60a5fa, #818cf8); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">DSF</span>
                </a>

                <button id="viewer-nav-left" class="nav-btn" onclick="viewerNavLeft()">◀</button>
                <div class="slider-wrapper">
                    <input type="range" id="page-slider" min="1" max="1" value="1" oninput="jumpToPage(this.value)">
                </div>
                <button id="viewer-nav-right" class="nav-btn" onclick="viewerNavRight()">▶</button>
                <span id="page-count" class="page-count">1 / 1</span>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="file-input" onchange="loadDsf(this)">

    <script type="module" src="js/viewer.js"></script>
</body>

</html>
