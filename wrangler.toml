# Cloudflare Pages + R2 configuration for DSF Studio
# Reference: https://developers.cloudflare.com/pages/functions/
#
# Setup checklist (one-time, in Cloudflare dashboard):
#   1. Create Pages project named "dsf-studio"
#   2. Create R2 bucket "dsf-media"  (and "dsf-media-staging" for staging)
#   3. Enable public access on the R2 bucket (or configure a custom domain)
#   4. Add environment variables in Pages Settings → Environment Variables:
#        FIREBASE_PROJECT_ID  = vmnn-26345          (production)
#        R2_PUBLIC_URL        = https://media.dsf.ink (production; use R2 default URL until custom domain is set)
#   5. Bind the R2 bucket in Pages Settings → Functions → R2 bucket bindings:
#        Variable name: R2_BUCKET  →  Bucket: dsf-media

name = "dsf-studio"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-01"

# ── Production ────────────────────────────────────────────────────────────────
# R2 bucket binding: uncomment after creating the bucket
# [[r2_buckets]]
# binding        = "R2_BUCKET"
# bucket_name    = "dsf-media"

# Environment variables: set these in the Cloudflare dashboard (not here,
# since this file is committed to the repo and FIREBASE_PROJECT_ID is not secret)
# [vars]
# FIREBASE_PROJECT_ID = "vmnn-26345"
# R2_PUBLIC_URL       = "https://media.dsf.ink"

# ── Staging ───────────────────────────────────────────────────────────────────
[env.staging]
name = "dsf-studio-staging"

# [[env.staging.r2_buckets]]
# binding        = "R2_BUCKET"
# bucket_name    = "dsf-media-staging"

# [env.staging.vars]
# FIREBASE_PROJECT_ID = "vmnn-26345-stg"
# R2_PUBLIC_URL       = "https://media-stg.dsf.ink"
