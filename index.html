<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSF - Digital Smart Format</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>
    <header id="portal-header">
        <a href="/" class="logo-area" title="DSF Portal">
            <span class="logo-text">DSF</span>
            <span class="logo-subtext">Digital Smart Format</span>
        </a>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search stories...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="header-actions">
            <!-- Studio Access Btn -->
            <a href="/studio.html" class="btn-studio">
                <span class="material-icons" style="font-size: 18px;">edit</span>
                <span>Studioを起動</span>
            </a>
        </div>
    </header>

    <main>
        <h2 class="section-title">Latest & Featured</h2>

        <div class="project-grid" id="public-feed">
            <!-- Cards will be dynamically injected here by portal.js -->
            <!-- Loading skeleton mock -->
            <div style="color:var(--portal-sub); padding:40px; text-align:center; width: 100%; grid-column: 1 / -1;">
                Fetching public gallery...
            </div>
        </div>
    </main>

    <!-- Portal Logic -->
    <script type="module" src="js/portal.js"></script>
</body>

</html>
