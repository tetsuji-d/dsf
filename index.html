<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>DSF Studio Pro - Ultimate Edition</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div id="app-shell">
        <header id="ribbon-bar">
            <div class="ribbon-row ribbon-top-row">
                <div class="ribbon-tabs">
                    <button class="ribbon-tab active" data-ribbon-tab="home">Home</button>
                    <button class="ribbon-tab" data-ribbon-tab="insert">Insert</button>
                    <button class="ribbon-tab" data-ribbon-tab="arrange">Arrange</button>
                    <button class="ribbon-tab" data-ribbon-tab="export">Export</button>
                    <button class="ribbon-tab" data-ribbon-tab="project">Project</button>
                </div>
                <div class="ribbon-auth">
                    <span id="auth-warning-badge" class="auth-warning-badge">ログインでクラウド機能が有効化されます</span>
                    <span id="auth-status" class="auth-status"></span>
                    <button id="btn-auth" class="btn-tool" onclick="toggleAuth()" title="Googleでログイン">Sign in with Google</button>
                </div>
            </div>
            <div class="ribbon-row ribbon-panel-row">
                <div class="ribbon-panel active" data-ribbon-panel="home">
                    <div class="ribbon-group">
                        <button id="btn-undo" class="btn-tool" onclick="performUndo()" title="元に戻す (Ctrl+Z)" disabled>↩ Undo</button>
                        <button id="btn-redo" class="btn-tool" onclick="performRedo()" title="やり直す (Ctrl+Shift+Z)" disabled>↪ Redo</button>
                    </div>
                    <div class="ribbon-group">
                        <button id="btn-save" class="btn-tool" onclick="saveProject()" title="保存" data-auth-required>💾 Save</button>
                        <button id="btn-share" class="btn-tool" onclick="shareProject()" title="ビューワーURLを共有" data-auth-required>🔗 Share</button>
                    </div>
                    <div class="ribbon-group grow">
                        <span class="field-label">Project</span>
                        <span id="project-title" class="project-title" contenteditable="true" oninput="onProjectTitleInput()"
                            onkeydown="onProjectTitleKeydown(event)" onblur="onProjectTitleBlur()">新規プロジェクト</span>
                        <span id="save-status" class="save-status"></span>
                    </div>
                    <div class="ribbon-group">
                        <button id="btn-toggle-sidebar" class="btn-tool" type="button" title="ページ一覧の表示切替">📚 Pages</button>
                        <button id="btn-toggle-panel" class="btn-tool" type="button" title="設定パネルの表示切替">⚙ Edit</button>
                    </div>
                </div>
                <div class="ribbon-panel" data-ribbon-panel="insert">
                    <div class="ribbon-group">
                        <button class="btn-tool" onclick="addSection()">＋ セクション追加</button>
                        <button class="btn-tool" onclick="addBubbleFab()">💬 吹き出し追加</button>
                        <button class="btn-tool" onclick="document.getElementById('file-upload').click()" data-auth-required>🖼 画像追加</button>
                    </div>
                </div>
                <div class="ribbon-panel" data-ribbon-panel="arrange">
                    <div class="ribbon-group">
                        <button class="btn-tool" onclick="resetCanvasView()">🔍 全体表示</button>
                        <button class="btn-tool" onclick="toggleImageAdjustment()" id="btn-adjust-img" title="位置・サイズ調整">✥ 画像調整</button>
                    </div>
                    <div class="ribbon-group ribbon-canvas-zoom">
                        <span class="field-label">Canvas</span>
                        <select id="canvas-zoom-select" class="zoom-select" onchange="setCanvasZoomPercent(this.value)">
                            <option value="25">25%</option>
                            <option value="33">33%</option>
                            <option value="50">50%</option>
                            <option value="67">67%</option>
                            <option value="75">75%</option>
                            <option value="90">90%</option>
                            <option value="100" selected>100%</option>
                            <option value="110">110%</option>
                            <option value="125">125%</option>
                            <option value="150">150%</option>
                            <option value="175">175%</option>
                            <option value="200">200%</option>
                            <option value="300">300%</option>
                            <option value="400">400%</option>
                            <option value="custom" hidden>100%</option>
                        </select>
                        <button class="btn-tool" onclick="resetCanvasView()">Fit</button>
                        <button class="btn-tool" onclick="setCanvasZoomPercent(100)">100%</button>
                    </div>
                    <div class="ribbon-group">
                        <div id="lang-tabs" class="lang-tabs"></div>
                    </div>
                </div>
                <div class="ribbon-panel" data-ribbon-panel="export">
                    <div class="ribbon-group">
                        <button class="btn-tool" onclick="exportProject()">⬇ エクスポート (.dsf)</button>
                        <button class="btn-tool" onclick="openProjectModal()" id="btn-projects" data-auth-required>📂 プロジェクト一覧</button>
                    </div>
                </div>
                <div class="ribbon-panel" data-ribbon-panel="project">
                    <div class="ribbon-group">
                        <button class="btn-tool" onclick="newProject()">📄 新規プロジェクト</button>
                        <button class="btn-tool" onclick="openProjectModal()" data-auth-required>📁 開く</button>
                    </div>
                    <div class="ribbon-group">
                        <span class="field-label">Language</span>
                        <div id="lang-tabs-project" class="lang-tabs"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="workspace">
            <aside id="sidebar">
                <div class="panel-head">
                    <h3>Pages</h3>
                    <button class="btn-sm" type="button" onclick="togglePagesPanel()">閉じる</button>
                </div>
                <div class="thumb-tools">
                    <label>列数:</label>
                    <div class="thumb-size-buttons">
                        <button class="btn-sm" data-thumb-cols="8" onclick="setThumbColumns(8)">8</button>
                        <button class="btn-sm" data-thumb-cols="5" onclick="setThumbColumns(5)">5</button>
                        <button class="btn-sm" data-thumb-cols="4" onclick="setThumbColumns(4)">4</button>
                        <button class="btn-sm" data-thumb-cols="2" onclick="setThumbColumns(2)">2</button>
                        <button class="btn-sm" data-thumb-cols="1" onclick="setThumbColumns(1)">1</button>
                    </div>
                </div>
                <div id="thumb-container"></div>
                <div class="panel-footer"><button class="btn" onclick="addSection()">+ セクション追加</button></div>
            </aside>

            <main id="editor-main">
                <div id="canvas-view" onmousedown="handleCanvasClick(event)" ontouchstart="handleCanvasClick(event)">
                    <div id="canvas-transform-layer">
                        <div id="content-render"></div>
                        <div id="bubble-layer"></div>
                        <div id="header-guide" class="canvas-guide header-guide"><span id="header-guide-title"></span></div>
                        <div id="footer-guide" class="canvas-guide footer-guide"><span class="footer-guide-label">フッター領域</span></div>
                    </div>
                    <div id="image-zoom-controls-floating">
                        <button class="btn-sm zoom-btn img-zoom-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="adjustImageZoom(0.1)" title="拡大">＋</button>
                        <button class="btn-sm zoom-btn img-zoom-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="adjustImageZoom(-0.1)" title="縮小">－</button>
                        <button class="btn-sm zoom-btn img-zoom-btn reset" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="resetImageTransform()" title="画像調整を初期化">⟲</button>
                    </div>
                    <button id="fab-add-bubble" class="fab-btn" onclick="addBubbleFab()" title="吹き出し追加">
                        <span class="material-icons">add_comment</span>
                    </button>
                    <button id="btn-reset-view" class="reset-view-btn" onclick="resetCanvasView()" title="全体表示">
                        <span class="material-icons">restart_alt</span>
                    </button>
                </div>
            </main>

            <aside id="panel-right">
                <div class="panel-head">
                    <h3>Edit</h3>
                    <button class="btn-sm" type="button" onclick="toggleEditPanel()">閉じる</button>
                </div>
                <div class="control-group">
                    <h4>作品設定</h4>
                    <label>作品タイトル（ヘッダー表示）</label>
                    <input type="text" id="prop-title" placeholder="タイトルを入力" oninput="updateTitle(this.value)">
                </div>
                <div class="control-group">
                    <h4>セクション設定</h4>
                    <label>タイプ</label>
                    <select id="prop-type" onchange="update('type', this.value)">
                        <option value="image">イメージセクション</option>
                        <option value="text">テキストセクション</option>
                    </select>

                    <div id="image-only-props">
                        <label>背景画像変更 / 位置調整</label>
                        <div class="inline-actions">
                            <button class="btn-sm" onclick="document.getElementById('file-upload').click()" data-auth-required>
                                <span class="material-icons inline-icon">image</span> 画像変更
                            </button>
                            <button class="btn-sm" onclick="toggleImageAdjustment()" id="btn-adjust-img-panel" title="位置・サイズ調整">
                                <span class="material-icons inline-icon">crop_free</span> 調整
                            </button>
                        </div>
                        <input type="file" id="file-upload" accept="image/*" onchange="uploadToStorage(this)" data-auth-required style="display:none;">
                    </div>

                    <div id="bubble-shape-props">
                        <label>吹き出し形状</label>
                        <select id="prop-shape" onchange="updateBubbleShape(this.value)">
                            <option value="speech">💬 通常</option>
                            <option value="thought">💭 考え中</option>
                            <option value="shout">💥 叫び</option>
                        </select>
                    </div>

                    <label id="text-label">テキスト入力 (選択中の吹き出し or 背景テキスト)</label>
                    <textarea id="prop-text" rows="5" oninput="updateActiveText(this.value, event)"></textarea>
                    <div id="text-fit-status" class="field-label" style="margin:-4px 0 8px 0;"></div>
                    <button id="btn-split-overflow" class="btn-sm" style="display:none; margin-bottom:10px;" onclick="splitOverflowToNextPage()">残りを次ページに分割</button>
                    <button class="btn btn-danger" onclick="deleteActive()">削除</button>
                </div>

                <div class="control-group">
                    <h4>言語設定</h4>
                    <div id="lang-list"></div>
                    <label>文字の向き (現在の言語)</label>
                    <select id="lang-writing-mode" onchange="updateGlobalWritingMode(this.value)">
                        <option value="horizontal-tb">横書き (→)</option>
                        <option value="vertical-rl">縦書き (↓)</option>
                    </select>

                    <div class="inline-actions">
                        <select id="lang-add-select">
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                        </select>
                        <button class="btn-sm" onclick="addLang()">＋追加</button>
                    </div>
                </div>
            </aside>
        </div>

        <div id="mobile-header">
            <span class="mobile-title">DSF Studio</span>
            <button id="btn-auth-mobile" class="btn-sm" onclick="toggleAuth()">Sign in</button>
        </div>

        <div id="mobile-overlay-backdrop" onclick="closeMobileSheet()"></div>

        <div id="mobile-action-sheet">
            <div id="mobile-sheet-home" class="mobile-sheet-content">
                <button class="btn-tool" onclick="performUndo()">↩ Undo</button>
                <button class="btn-tool" onclick="performRedo()">↪ Redo</button>
                <button class="btn-tool" onclick="saveProject()" data-auth-required>💾 Save</button>
                <button class="btn-tool" onclick="shareProject()" data-auth-required>🔗 Share</button>
                <button class="btn-tool" onclick="toggleAuth()">👤 Auth</button>
            </div>
            <div id="mobile-sheet-add" class="mobile-sheet-content">
                <button class="btn-tool" onclick="addSection()">＋ セクション追加</button>
                <button class="btn-tool" onclick="addBubbleFab()">💬 吹き出し追加</button>
                <button class="btn-tool" onclick="document.getElementById('file-upload').click()" data-auth-required>🖼 画像追加</button>
            </div>
            <div id="mobile-sheet-export" class="mobile-sheet-content">
                <button class="btn-tool" onclick="saveProject()" data-auth-required>💾 Save</button>
                <button class="btn-tool" onclick="shareProject()" data-auth-required>🔗 Share</button>
                <button class="btn-tool" onclick="exportProject()">⬇ エクスポート</button>
                <button class="btn-tool" onclick="openProjectModal()" data-auth-required>📂 プロジェクト一覧</button>
            </div>
            <div id="mobile-sheet-lang" class="mobile-sheet-content">
                <div id="lang-tabs-mobile" class="lang-tabs"></div>
            </div>
        </div>

        <nav id="bottom-bar">
            <button class="bottom-item" data-mobile-action="home"><span class="material-icons">home</span><span>Home</span></button>
            <button class="bottom-item" data-mobile-action="pages"><span class="material-icons">view_carousel</span><span>Pages</span></button>
            <button class="bottom-item" data-mobile-action="add"><span class="material-icons">add_circle</span><span>Add</span></button>
            <button class="bottom-item" data-mobile-action="edit"><span class="material-icons">tune</span><span>Edit</span></button>
            <button class="bottom-item" data-mobile-action="export"><span class="material-icons">ios_share</span><span>Export</span></button>
            <button class="bottom-item" data-mobile-action="lang"><span class="material-icons">language</span><span>Lang</span></button>
        </nav>
    </div>

    <!-- プロジェクト一覧モーダル -->
    <div id="project-modal">
        <div class="modal-overlay" onclick="closeProjectModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>📂 プロジェクト一覧</h2>
                <div class="modal-header-actions">
                    <button class="btn-modal primary" onclick="newProject()">＋ 新規プロジェクト</button>
                    <button class="btn-modal" onclick="closeProjectModal()">閉じる</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="project-grid"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
