<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSF - Digital Smart Format</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>
    <header id="portal-header">
        <a href="/" class="logo-area" title="DSF Portal">
            <span class="logo-text">DSF</span>
            <span class="logo-subtext">Digital Smart Format</span>
        </a>

        <div class="search-container" role="search">
            <label for="portal-search" class="visually-hidden">作品を検索</label>
            <input type="text" id="portal-search" class="search-input" placeholder="作品タイトル・作者名で検索"
                aria-label="作品を検索" autocomplete="off">
            <span class="search-icon material-icons" aria-hidden="true">search</span>
        </div>

        <div class="header-actions">
            <!-- Studio Access Btn -->
            <a href="/studio.html" class="btn-studio" aria-label="Studioを起動">
                <span class="material-icons" aria-hidden="true">edit</span>
                <span>Studioを起動</span>
            </a>
        </div>
    </header>

    <main>
        <h2 class="section-title">Latest & Featured</h2>
        <p id="feed-status" class="feed-status" aria-live="polite">作品を読み込み中...</p>
        <div id="portal-feedback" class="portal-feedback" aria-live="polite"></div>

        <div class="project-grid" id="public-feed" aria-live="polite"></div>
    </main>

    <!-- Portal Logic -->
    <script type="module" src="js/portal.js"></script>
    <noscript>このページを利用するにはJavaScriptを有効にしてください。</noscript>
</body>

</html>
