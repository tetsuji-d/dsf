<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSF - Digital Smart Format</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Modern Portal Aesthetics */
        :root {
            --portal-bg: #0f1115;
            /* Sleek dark mode background */
            --portal-card: #1c2028;
            /* Slightly lighter card bg */
            --portal-text: #e2e8f0;
            --portal-sub: #94a3b8;
            --portal-accent: #3b82f6;
            /* Vibrant blue accent */
        }

        body {
            background-color: var(--portal-bg);
            color: var(--portal-text);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            overflow-y: auto;
        }

        /* --- Header --- */
        #portal-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(15, 17, 21, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            text-decoration: none;
            color: #fff;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
            margin-left: 2px;
        }

        /* --- Search Bar (Mock for now) --- */
        .search-container {
            flex: 1;
            max-width: 500px;
            margin: 0 32px;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 44px;
            /* UD Standard */
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            padding: 0 44px 0 20px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--portal-accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--portal-sub);
            pointer-events: none;
        }

        /* --- Header Actions --- */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-studio {
            background: var(--portal-accent);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-studio:hover {
            background: #2563eb;
        }

        /* --- Main Content --- */
        main {
            padding: 40px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }

        /* --- Project Grid --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px 20px;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
        }

        .card-thumb-container {
            width: 100%;
            aspect-ratio: 9/16;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2f3a;
            position: relative;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-card:hover .card-thumb {
            transform: scale(1.05);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-author {
            font-size: 14px;
            color: var(--portal-sub);
        }

        .card-meta {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-container {
                display: none;
                /* Hide search on mobile for now */
            }

            .project-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                /* 2 columns on mobile */
                gap: 20px 12px;
            }
        }
    </style>
</head>

<body>
    <header id="portal-header">
        <a href="/" class="logo-area" title="DSF Portal">
            <span class="logo-text">DSF</span>
            <span class="logo-subtext">Digital Smart Format</span>
        </a>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search stories...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="header-actions">
            <!-- Studio Access Btn -->
            <a href="/studio.html" class="btn-studio">
                <span class="material-icons" style="font-size: 18px;">edit</span>
                <span>Studioを起動</span>
            </a>
        </div>
    </header>

    <main>
        <h2 class="section-title">Latest & Featured</h2>

        <div class="project-grid" id="public-feed">
            <!-- Cards will be dynamically injected here by portal.js -->
            <!-- Loading skeleton mock -->
            <div style="color:var(--portal-sub); padding:40px; text-align:center; width: 100%; grid-column: 1 / -1;">
                Fetching public gallery...
            </div>
        </div>
    </main>

    <!-- Portal Logic -->
    <script type="module" src="js/portal.js"></script>
</body>

</html>
