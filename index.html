<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSF - Digital Smart Format</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/portal.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <header id="portal-header">
        <div class="portal-header-left">
            <button type="button" class="header-icon-btn" id="btn-library-menu" aria-label="Library menu" aria-expanded="false" title="Library menu">
                <span class="material-icons" aria-hidden="true">menu</span>
            </button>
            <div class="logo-group">
                <a href="/" class="logo-area" title="DSF Library">
                    <span class="logo-text">DSF</span>
                    <span class="logo-subtext" data-i18n="libraryName">Library</span>
                </a>
                <div id="lang-switcher-brand" class="lang-switcher js-lang-switcher" role="group" aria-label="言語切り替え / Language">
                    <button class="lang-btn active" data-lang="ja">JA</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </div>

        <div class="search-container" role="search">
            <label for="portal-search" class="visually-hidden" data-i18n="searchLabel">作品を検索</label>
            <input type="text" id="portal-search" class="search-input"
                data-i18n-placeholder="searchPlaceholder"
                placeholder="作品タイトル・作者名で検索"
                aria-label="作品を検索" autocomplete="off">
            <span class="search-icon material-icons" aria-hidden="true">search</span>
        </div>

        <div class="header-actions">
            <div class="create-menu-wrap">
                <button type="button" class="header-pill-btn" id="btn-create-menu" aria-expanded="false">
                    <span class="material-icons" aria-hidden="true">add</span>
                    <span data-i18n="createMenu">作成</span>
                </button>
                <div class="header-popover create-menu-popover" id="create-menu-popover" role="menu">
                    <a href="/studio.html?room=home" class="popover-link" data-i18n="navProjects">Projects</a>
                    <a href="/studio.html?room=editor" class="popover-link" data-i18n="navEditor">Editor</a>
                    <a href="/studio.html?room=press" class="popover-link" data-i18n="navPress">Press</a>
                    <a href="/studio.html?room=works" class="popover-link" data-i18n="navWorks">Works</a>
                </div>
            </div>

            <button type="button" class="header-icon-btn" id="btn-notifications" aria-label="Notifications" title="Notifications">
                <span class="material-icons" aria-hidden="true">notifications_none</span>
            </button>

            <div id="auth-area"></div>
        </div>
    </header>

    <aside id="library-drawer" aria-label="Library drawer" aria-hidden="true">
        <div class="drawer-head">
            <div>
                <div class="drawer-kicker">DSF Library</div>
                <strong data-i18n="libraryName">Library</strong>
            </div>
            <button type="button" class="header-icon-btn" id="btn-library-menu-close" aria-label="Close library menu">
                <span class="material-icons" aria-hidden="true">close</span>
            </button>
        </div>
        <nav class="drawer-nav">
            <button type="button" class="drawer-link is-active">
                <span class="material-icons" aria-hidden="true">home</span>
                <span data-i18n="drawerHome">ホーム</span>
            </button>
            <button type="button" class="drawer-link">
                <span class="material-icons" aria-hidden="true">history</span>
                <span data-i18n="drawerHistory">履歴</span>
            </button>
            <button type="button" class="drawer-link">
                <span class="material-icons" aria-hidden="true">category</span>
                <span data-i18n="drawerCategories">コンテンツカテゴリ</span>
            </button>
            <button type="button" class="drawer-link">
                <span class="material-icons" aria-hidden="true">download_done</span>
                <span data-i18n="drawerOffline">オフライン</span>
            </button>
        </nav>
    </aside>
    <div id="portal-scrim" hidden></div>

    <main>
        <section class="library-hero">
            <div class="library-hero-copy">
                <p class="library-eyebrow">DSF Library</p>
                <h1 class="library-title" data-i18n="libraryHomeTitle">読む、探す、集める。</h1>
                <p class="library-desc" data-i18n="libraryHomeDesc">公開作品を探して、気になる作品をすぐ開ける Reader 向けホームです。</p>
            </div>
            <div class="library-hero-actions">
                <a href="/studio.html?room=editor" class="btn-studio" aria-label="Create in Studio">
                    <span class="material-icons" aria-hidden="true">draw</span>
                    <span data-i18n="studioBtn">Studioを起動</span>
                </a>
            </div>
        </section>
        <h2 class="section-title" data-i18n="sectionTitle">最新・注目作品</h2>
        <p id="feed-status" class="feed-status" aria-live="polite"></p>
        <div id="portal-feedback" class="portal-feedback" aria-live="polite"></div>
        <div class="project-grid" id="public-feed" aria-live="polite"></div>
    </main>

    <!-- Portal Logic -->
    <script type="module" src="js/portal.js"></script>
    <noscript>このページを利用するにはJavaScriptを有効にしてください。</noscript>
</body>

</html>
